[window]
decorations = "none"
opacity = 0.6
blur = true
padding = { x = 12, y = 12 }

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font" 
style = "Regular"

[colors.primary]
foreground = "#C0C0C0"
background = "#000000"

[colors.normal]
black = "#000000"
red = "#ff5555"
green = "#C0C0C0"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#C0C0C0"
