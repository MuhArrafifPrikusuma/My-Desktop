# Force 1080p (Best balance for your Vivobook 14)
    ytdl-format="bestvideo[height<=?720]+bestaudio/best"

    # OR for 4K (If your internet/screen supports it)
    # ytdl-format="bestvideo[height<=?2160]+bestaudio/best"

    # Enable hardware acceleration for smooth playback
    hwdec=auto-safe
    vo=gpu
    ```
3.  **Save and exit** (`Ctrl+O`, `Enter`, `Ctrl+X`).

Now, every time `youtube-tui` launches a video, `mpv` will automatically select the quality you defined in this file.

