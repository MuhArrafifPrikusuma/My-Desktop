### 3. Check the "Hidden" Command Menu
In version `0.9.4`, if `S` or `Shift + S` is failing, try pressing **`:`** (the colon key, like in Vim). 
*   If a command bar appears at the bottom, type `set quality 1080` and hit **Enter**.

