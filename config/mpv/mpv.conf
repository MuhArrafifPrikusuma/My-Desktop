### Summary Checklist for Fedora
If you still encounter issues playing the higher quality streams:
*   **Update yt-dlp**: YouTube changes its protocols frequently. Run `pip install -U yt-dlp` or `sudo dnf upgrade yt-dlp`.
*   **Codecs**: Ensure you have the `ffmpeg-libs` from RPM Fusion as mentioned earlier, as the default Fedora libraries often struggle with the specific high-quality formats YouTube uses.

Since you are running this on an **ASUS Vivobook 14**, I recommend sticking to **1080p** for the best balance of battery life and visual clarity, especially if you have other development tools running in the background.
